<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack - 个人环保追踪系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-base: #020617; 
            --bg-surface: #0f172a; 
            --bg-surface-elevated: #1e293b;
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            --accent: #3b82f6; 
            --success: #10b981; 
            --warning: #f59e0b; 
            --danger: #ef4444;
            --border: #334155;
            --border-light: #475569;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text-main); 
            line-height: 1.6; 
            min-height: 100vh;
        }

        /* 顶部导航与用户信息 */
        .app-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-area { display: flex; align-items: baseline; gap: 10px; }
        .logo-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(to right, #3b82f6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-subtitle { font-size: 0.75rem; color: var(--text-muted); font-family: 'Menlo', monospace; border-left: 1px solid var(--border); padding-left: 10px; }
        
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .level-badge { background: var(--bg-surface-elevated); border: 1px solid var(--border-light); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; color: var(--warning); display: flex; align-items: center; gap: 6px; }
        
        /* 核心布局 */
        .container { max-width: 1280px; margin: 0 auto; padding: 25px; display: grid; grid-template-columns: 350px 1fr; gap: 25px; align-items: stretch; }
        @media (max-width: 992px) { .container { grid-template-columns: 1fr; } }

        aside { min-height: 0; }

        /* 卡片基础样式 */
        .card { 
            background: var(--bg-surface); 
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 20px; 
            position: relative;
            overflow: hidden;
        }
        .left-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-height: max-content;
            min-height: 0;
        }
        .card-header { font-size: 1.05rem; font-weight: 600; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .card-header-actions { display: flex; gap: 10px; }

        /* 状态指标区 */
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        @media (max-width: 768px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
        .metric-card { background: var(--bg-surface); border: 1px solid var(--border); padding: 15px; border-radius: var(--radius-md); text-align: left; }
        .metric-title { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .metric-value { font-size: 1.6rem; font-weight: 700; font-family: 'Menlo', monospace; }
        .metric-unit { font-size: 0.8rem; font-weight: normal; color: var(--text-muted); }

        /* 表单与选择器 */
        .item-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            margin-bottom: 20px; 
            overflow-y: auto; 
            padding-right: 6px;
            flex-grow: 1;
            min-height: 0;
        }
        
        /* 极简自定义滚动条 */
        .item-grid::-webkit-scrollbar { width: 4px; }
        .item-grid::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.3); border-radius: 4px; }
        .item-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .item-grid::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .item-radio { display: none; }
        .item-label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg-surface-elevated); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 15px 10px; cursor: pointer;
            transition: all 0.2s ease; text-align: center; gap: 8px;
        }
        .item-label:hover { border-color: var(--border-light); background: rgba(51, 65, 85, 0.5); }
        .item-icon { font-size: 1.5rem; }
        .item-name { font-size: 0.85rem; font-weight: 500; }
        .item-meta { font-size: 0.7rem; color: var(--success); font-family: monospace; }
        
        .item-radio:checked + .item-label {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        .number-input-wrapper { display: flex; align-items: center; background: var(--bg-surface-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }
        .number-input-wrapper button { background: transparent; border: none; color: var(--text-main); width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; transition: background 0.2s; }
        .number-input-wrapper button:hover { background: rgba(255, 255, 255, 0.05); }
        .number-input-wrapper input { flex: 1; background: transparent; border: none; color: white; text-align: center; font-size: 1.1rem; font-family: monospace; outline: none; -moz-appearance: textfield; }
        .number-input-wrapper input::-webkit-outer-spin-button, .number-input-wrapper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .btn-primary { background: linear-gradient(135deg, var(--accent), #2563eb); color: white; border: none; padding: 14px; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; width: 100%; font-size: 1rem; transition: opacity 0.2s, transform 0.1s; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
        .btn-ghost:hover { color: var(--danger); border-color: rgba(239, 68, 68, 0.5); background: rgba(239, 68, 68, 0.1); }

        /* 图表与数据区 */
        .chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 25px; }
        @media (max-width: 1100px) { .chart-row { grid-template-columns: 1fr; } }
        .chart-container { position: relative; height: 260px; width: 100%; }

        /* 进度条 */
        .progress-section { margin-top: 20px; padding-top: 15px; border-top: 1px dashed var(--border); }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 5px; font-family: monospace; }
        .progress-bar-bg { background: var(--bg-base); height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
        .progress-bar-fill { background: linear-gradient(90deg, var(--warning), #fbbf24); height: 100%; width: 0%; transition: width 0.5s ease-out; }

        /* 表格 */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); padding: 12px 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(51, 65, 85, 0.5); font-family: 'Menlo', monospace; }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }
        .td-type { display: flex; align-items: center; gap: 8px; font-family: -apple-system, sans-serif; }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; background: rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo-area">
            <div class="logo-title">EcoTrack</div>
            <div class="logo-subtitle">Research Prototype // SUST</div>
        </div>
        <div class="user-profile">
            <span style="font-size: 0.85rem; color: var(--text-muted);">Zane (202415030425)</span>
            <div class="level-badge" id="levelBadge">⭐ Lv. 1</div>
        </div>
    </header>

    <div class="container">
        <!-- 左侧输入面板 -->
        <aside>
            <div class="card left-card">
                <div class="card-header">记录新回收 (Log Entry)</div>
                
                <div class="item-grid" id="itemGrid">
                    <!-- JS 渲染选项 -->
                </div>

                <div class="input-group">
                    <label>回收数量 (Quantity)</label>
                    <div class="number-input-wrapper">
                        <button onclick="adjustCount(-1)">−</button>
                        <input type="number" id="itemCount" value="1" min="1">
                        <button onclick="adjustCount(1)">+</button>
                    </div>
                </div>

                <button class="btn-primary" onclick="logRecycling()">提交记录 (Submit)</button>

                <div class="progress-section">
                    <div class="progress-info">
                        <span>当前经验值</span>
                        <span id="expText">0 / 100 XP</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="expFill"></div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧仪表盘 -->
        <main>
            <!-- 核心数据 -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-title">累计减排 CO₂</div>
                    <div class="metric-value" style="color: var(--success);" id="valCo2">0.00 <span class="metric-unit">kg</span></div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">总回收物品</div>
                    <div class="metric-value" style="color: var(--accent);" id="valItems">0 <span class="metric-unit">件</span></div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">环保等效种树</div>
                    <div class="metric-value" style="color: #34d399;" id="valTrees">0.0 <span class="metric-unit">棵</span></div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">环保积分</div>
                    <div class="metric-value" style="color: var(--warning);" id="valPoints">0 <span class="metric-unit">Pts</span></div>
                </div>
            </div>

            <!-- 图表区 -->
            <div class="chart-row">
                <div class="card">
                    <div class="card-header">近 7 天环境影响分析 (Impact Trend)</div>
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">材料分类占比 (Composition)</div>
                    <div class="chart-container">
                        <canvas id="doughnutChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 历史记录明细 -->
        <div class="card">
            <div class="card-header">
                <span>行为日志 (Activity Log)</span>
                <div class="card-header-actions">
                    <button id="btnClear" class="btn-ghost" onclick="clearAllData()">危：清空数据</button>
                </div>
            </div>
            <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>时间 (Time)</th>
                                <th>物品特征 (Material)</th>
                                <th style="text-align: right;">数量 (Qty)</th>
                                <th style="text-align: right;">减排贡献 (CO₂)</th>
                                <th style="text-align: right;">获得积分 (Pts)</th>
                                <th style="text-align: center;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable">
                            <!-- JS 渲染 -->
                        </tbody>
    <script>
    // 扩展环保物品配置库（基于科学预估值）
    const ITEM_DB = {
        'plastic': { id: 'plastic', icon: '🥤', name: '塑料瓶', co2: 0.08, pts: 5, color: '#3b82f6' },
        'cardboard': { id: 'cardboard', icon: '📦', name: '纸箱板', co2: 0.20, pts: 10, color: '#f59e0b' },
        'paper': { id: 'paper', icon: '📄', name: '废纸张', co2: 0.10, pts: 2, color: '#e2e8f0' },
        'can': { id: 'can', icon: '🥫', name: '易拉罐', co2: 0.15, pts: 8, color: '#94a3b8' },
        'glass': { id: 'glass', icon: '🍾', name: '玻璃瓶', co2: 0.12, pts: 6, color: '#10b981' },
        'clothes': { id: 'clothes', icon: '👕', name: '旧衣物', co2: 0.30, pts: 15, color: '#8b5cf6' },
        'electronics': { id: 'electronics', icon: '📱', name: '电子废弃物', co2: 0.50, pts: 20, color: '#f43f5e' },
        'battery': { id: 'battery', icon: '🔋', name: '废旧电池', co2: 0.15, pts: 12, color: '#84cc16' },
        'metal': { id: 'metal', icon: '🔧', name: '废旧五金', co2: 0.25, pts: 10, color: '#a8a29e' },
        'cup': { id: 'cup', icon: '☕', name: '纸/塑杯', co2: 0.06, pts: 4, color: '#d946ef' },
        'book': { id: 'book', icon: '📚', name: '旧教材/书本', co2: 0.40, pts: 15, color: '#0ea5e9' },
        'bag': { id: 'bag', icon: '🛍️', name: '塑料包装袋', co2: 0.03, pts: 2, color: '#ec4899' }
    };
    
    // 数据隔离至 v2 版本
    const STORAGE_KEY = 'ecotrack_data_v2';
    let records = [];
    let charts = { trend: null, comp: null };

    // 核心初始化
    function init() {
        renderItemGrid();
        loadData();
        refreshUI();
        
        // 全局图表配置
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.font.family = 'Menlo, monospace';
        Chart.defaults.plugins.tooltip.backgroundColor = '#1e293b';
        Chart.defaults.plugins.tooltip.borderColor = '#334155';
        Chart.defaults.plugins.tooltip.borderWidth = 1;
    }

    // 加载历史数据
    function loadData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try { records = JSON.parse(saved); } catch (e) { records = []; }
        }
    }

    // 渲染左侧单选网格
    function renderItemGrid() {
        const grid = document.getElementById('itemGrid');
        let html = '';
        let isFirst = true;
        for (let key in ITEM_DB) {
            const item = ITEM_DB[key];
            html += `
                <div>
                    <input type="radio" name="itemSelection" id="radio_${key}" value="${key}" class="item-radio" ${isFirst ? 'checked' : ''}>
                    <label for="radio_${key}" class="item-label">
                        <span class="item-icon">${item.icon}</span>
                        <span class="item-name">${item.name}</span>
                        <span class="item-meta">+${item.co2}kg CO₂</span>
                    </label>
                </div>
            `;
            isFirst = false;
        }
        grid.innerHTML = html;
    }

    // 调整数量微交互
    function adjustCount(delta) {
        const input = document.getElementById('itemCount');
        let val = parseInt(input.value) + delta;
        if (val < 1) val = 1;
        input.value = val;
    }

    // 提交记录
    function logRecycling() {
        const selectedRadio = document.querySelector('input[name="itemSelection"]:checked');
        if (!selectedRadio) return;
        
        const typeId = selectedRadio.value;
        const count = parseInt(document.getElementById('itemCount').value);
        if (isNaN(count) || count < 1) return;

        const config = ITEM_DB[typeId];
        const record = {
            id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(),
            timestamp: new Date().toISOString(),
            type: typeId,
            count: count,
            co2Saved: parseFloat((config.co2 * count).toFixed(2)),
            points: config.pts * count
        };

        records.unshift(record);
        saveData();
        
        // 重置状态
        document.getElementById('itemCount').value = 1;
        refreshUI();
    }

    function deleteRecord(id) {
        records = records.filter(r => r.id !== id);
        saveData();
        refreshUI();
    }

    let confirmClear = false;
    let clearTimer = null;

    function clearAllData() {
        const btn = document.getElementById('btnClear');
        if (!confirmClear) {
            confirmClear = true;
            btn.innerText = "确认清空？(再次点击)";
            btn.style.borderColor = "var(--danger)";
            btn.style.color = "var(--danger)";
            btn.style.background = "rgba(239, 68, 68, 0.1)";
            
            clearTimer = setTimeout(() => {
                confirmClear = false;
                btn.innerText = "危：清空数据";
                btn.style.borderColor = "";
                btn.style.color = "";
                btn.style.background = "";
            }, 3000);
        } else {
            clearTimeout(clearTimer);
            confirmClear = false;
            btn.innerText = "危：清空数据";
            btn.style.borderColor = "";
            btn.style.color = "";
            btn.style.background = "";
            
            records = [];
            saveData();
            refreshUI();
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    // 统一更新 UI
    function refreshUI() {
        let totalCo2 = 0, totalItems = 0, totalPoints = 0;
        
        records.forEach(r => {
            totalCo2 += r.co2Saved;
            totalItems += r.count;
            totalPoints += r.points;
        });

        // 基础指标
        document.getElementById('valCo2').innerText = totalCo2.toFixed(2);
        document.getElementById('valItems').innerText = totalItems;
        document.getElementById('valPoints').innerText = totalPoints;
        
        // 等效算法: 1棵树每年吸收约 20kg CO2 -> 预估等效
        const trees = (totalCo2 / 20).toFixed(3);
        document.getElementById('valTrees').innerText = trees;

        // 经验值系统: 每 100 分升 1 级
        const level = Math.floor(totalPoints / 100) + 1;
        const currentExp = totalPoints % 100;
        const expPct = (currentExp / 100) * 100;
        
        document.getElementById('levelBadge').innerText = `⭐ Lv. ${level}`;
        document.getElementById('expText').innerText = `${currentExp} / 100 XP`;
        document.getElementById('expFill').style.width = `${expPct}%`;

        renderTable();
        renderCharts();
    }

    // 渲染明细表格
    function renderTable() {
        const tbody = document.getElementById('historyTable');
        if (records.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px; color:var(--text-muted);">系统暂无数据，请在左侧面板录入。</td></tr>`;
            return;
        }

        let html = '';
        // 限制渲染最近 15 条
        records.slice(0, 15).forEach(r => {
            const dateStr = new Date(r.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' });
            const itemDef = ITEM_DB[r.type] || { icon: '❓', name: '未知', color: '#fff' };
            
            html += `
                <tr>
                    <td>${dateStr}</td>
                    <td>
                        <div class="td-type">
                            <span style="font-size:1.2rem;">${itemDef.icon}</span>
                            <span>${itemDef.name}</span>
                        </div>
                    </td>
                    <td style="text-align: right;">${r.count}</td>
                    <td style="text-align: right; color: var(--success);">+${r.co2Saved.toFixed(2)}</td>
                    <td style="text-align: right; color: var(--warning);">+${r.points}</td>
                    <td style="text-align: center;">
                        <button class="btn-ghost" style="padding: 4px 8px; font-size: 0.7rem;" onclick="deleteRecord('${r.id}')">Del</button>
                    </td>
                </tr>
            `;
        });
        tbody.innerHTML = html;
    }

    // 渲染高级可视化图表
    function renderCharts() {
        renderTrendChart();
        renderDoughnutChart();
    }

    function renderTrendChart() {
        const ctx = document.getElementById('trendChart').getContext('2d');
        const last7Days = [], dataMap = {};
        
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().split('T')[0];
            last7Days.push(dateStr);
            dataMap[dateStr] = 0;
        }

        records.forEach(r => {
            const dateStr = r.timestamp.split('T')[0];
            if (dataMap[dateStr] !== undefined) dataMap[dateStr] += r.co2Saved;
        });

        if (charts.trend) charts.trend.destroy();

        // 创建自定义渐变
        const gradient = ctx.createLinearGradient(0, 0, 0, 260);
        gradient.addColorStop(0, 'rgba(16, 185, 129, 0.8)');
        gradient.addColorStop(1, 'rgba(16, 185, 129, 0.1)');

        charts.trend = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: last7Days.map(d => d.substring(5)), // MM-DD
                datasets: [{
                    label: 'CO₂ 减排 (kg)',
                    data: last7Days.map(d => dataMap[d]),
                    backgroundColor: gradient,
                    borderRadius: 6,
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(51, 65, 85, 0.3)' }, border: { dash: [4, 4] } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function renderDoughnutChart() {
        const ctx = document.getElementById('doughnutChart').getContext('2d');
        const typeCounts = {};
        
        records.forEach(r => {
            if (!typeCounts[r.type]) typeCounts[r.type] = 0;
            typeCounts[r.type] += r.count;
        });

        const labels = [];
        const data = [];
        const bgColors = [];

        for (let key in typeCounts) {
            if (ITEM_DB[key]) {
                labels.push(ITEM_DB[key].name);
                data.push(typeCounts[key]);
                bgColors.push(ITEM_DB[key].color);
            }
        }

        if (charts.comp) charts.comp.destroy();

        charts.comp = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels.length ? labels : ['暂无数据'],
                datasets: [{
                    data: data.length ? data : [1],
                    backgroundColor: bgColors.length ? bgColors : ['#334155'],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '75%',
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 10, padding: 15 } },
                    tooltip: { enabled: data.length > 0 }
                }
            }
        });
    }

    // 启动
    init();
</script>
</body>
</html>
